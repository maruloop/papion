name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    env:
      MOONBIT_VERSION: 0.9.0+9f1423bcb
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: macos-14
            target: macos-arm64
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: ./.github/actions/setup-moonbit
        with:
          version: ${{ env.MOONBIT_VERSION }}
      - run: moon update
      - name: Build native binary
        run: moon build --release --target native
      - name: Package
        run: |
          BIN="_build/native/release/build/native/native.exe"
          TARGET="${{ matrix.target }}"
          OUT="papion-${TARGET}.tar.gz"
          mkdir -p dist
          cp "$BIN" dist/papion
          chmod +x dist/papion
          tar -C dist -czf "$OUT" papion
      - uses: actions/upload-artifact@v4
        with:
          name: papion-${{ matrix.target }}
          path: core/papion-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          if gh release view "$TAG" -R "$REPO" >/dev/null 2>&1; then
            gh release upload "$TAG" *.tar.gz --clobber -R "$REPO"
          else
            gh release create "$TAG" *.tar.gz --generate-notes -R "$REPO"
          fi

  docker:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Extract version
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.version }}
            ghcr.io/${{ github.repository }}:latest
