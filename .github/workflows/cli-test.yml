name: CLI Tests

on:
  push:
    branches: [main]
    paths: ['core/cli/**', '.github/workflows/cli-test.yml']
  pull_request:
    paths: ['core/cli/**', '.github/workflows/cli-test.yml']

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: hustcer/setup-moonbit@e9b0a3082767ae669bf7588992ae3ba9eac09baa
      - run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev libarchive-dev
      - run: moon update
      - run: moon fmt --check
      - run: moon test --deny-warn
      - name: Build native binary
        run: moon build --target native
        env:
          MOON_CC: clang
      - name: Check generated interface is up to date
        run: moon info && git diff --exit-code
