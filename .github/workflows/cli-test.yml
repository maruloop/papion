name: CLI Tests

on:
  push:
    branches: [main]
    paths: ['core/cli/**', 'core/native/**', 'core/wasm/**', '.github/workflows/cli-test.yml']
  pull_request:
    paths: ['core/cli/**', 'core/native/**', 'core/wasm/**', '.github/workflows/cli-test.yml']

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      MOONBIT_VERSION: 0.9.0+9f1423bcb
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: ./.github/actions/setup-moonbit
        with:
          version: ${{ env.MOONBIT_VERSION }}
      - run: moon update
      - run: moon fmt --check
      - run: moon test --deny-warn
      - run: moon test --target native --deny-warn
      - name: Build native binary
        run: moon build --target native
      - name: Smoke test - no args exits 2
        run: |
          set +e
          ./_build/native/debug/build/native/native.exe
          [ $? -eq 2 ]
      - name: Smoke test - invalid target exits 2
        run: |
          set +e
          ./_build/native/debug/build/native/native.exe run bad
          [ $? -eq 2 ]
      - name: Smoke test - real action
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set +e
          ./_build/native/debug/build/native/native.exe \
            run actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 \
            --format json
          code=$?
          set -e
          [ $code -eq 0 ] || [ $code -eq 1 ]
      - name: Check generated interface is up to date
        run: moon info && git diff --ignore-blank-lines --exit-code
